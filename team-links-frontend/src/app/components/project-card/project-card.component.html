<div class="tl-card project-card" (click)="closeMenu()">
  <div class="card-body">
    <h3 class="card-title">{{ project.name }}</h3>
    <p class="card-desc">{{ project.description || 'Sem descrição' }}</p>
  </div>

  <div class="card-footer">
    <div class="footer-badges">
      <span class="tl-badge badge-accent">{{ project.clientName }}</span>
      <span class="tl-badge badge-accent">
        {{ project.linkCount }} {{ project.linkCount === 1 ? 'link' : 'links' }}
      </span>
    </div>

    <div class="card-actions">
      <a [routerLink]="['/projects', project.id]" class="btn btn-secondary btn-sm" title="Ver links do projeto">
        <fa-icon [icon]="faLink"></fa-icon> Ver
      </a>

      <div class="menu-wrapper" (click)="$event.stopPropagation()">
        <button class="btn btn-ghost btn-icon" (click)="toggleMenu($event)">
          ···
        </button>
        @if (menuOpen) {
          <div class="dropdown-menu">
            <button class="dropdown-item" (click)="onEdit()" title="Editar projeto">
              <fa-icon [icon]="faPencil"></fa-icon> Editar
            </button>
            <button class="dropdown-item danger" (click)="onDelete()" title="Excluir projeto">
              <fa-icon [icon]="faTrash"></fa-icon> Excluir
            </button>
          </div>
        }
      </div>
    </div>
  </div>
</div>
