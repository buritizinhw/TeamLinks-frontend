@if (open) {
  <div class="modal-overlay" (click)="close()">
    <div class="modal-box" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h2>{{ link ? 'Editar Link' : 'Novo Link' }}</h2>
      </div>
      <form class="modal-body" style="display:flex;flex-direction:column;gap:16px" (ngSubmit)="onSubmit()">

        <div class="form-group">
          <label class="form-label">Nome <span class="required">*</span></label>
          <input
            class="form-input"
            [(ngModel)]="name"
            name="name"
            placeholder="Nome do link"
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label">URL <span class="required">*</span></label>
          <input
            class="form-input"
            type="url"
            [(ngModel)]="url"
            name="url"
            placeholder="https://exemplo.com"
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label">Descrição</label>
          <input
            class="form-input"
            [(ngModel)]="description"
            name="description"
            placeholder="Descrição opcional"
          />
        </div>

        <div class="form-group">
          <label class="form-label">Tags</label>
          <div class="tag-dropdown">
            <button
              type="button"
              class="tag-trigger"
              [class.placeholder]="!selectedTagNames.length"
              (click)="toggleTagMenu()"
            >
              <span>{{ triggerLabel || 'Selecionar tags...' }}</span>
              <span>⌄</span>
            </button>

            @if (tagMenuOpen) {
              <div class="tag-menu">
                @for (tag of availableTags; track tag.id) {
                  <div class="tag-option" (click)="toggleTag(tag.name)">
                    <span class="check-icon" [class.visible]="isSelected(tag.name)">
                      <fa-icon [icon]="faCheck"></fa-icon>
                    </span>
                    {{ tag.name }}
                  </div>
                }
              </div>
            }

            @if (selectedTagNames.length) {
              <div class="selected-tags">
                @for (tagName of selectedTagNames; track tagName) {
                  <span class="selected-chip">
                    {{ tagName }}
                    <button type="button" (click)="removeTag(tagName)" title="Remover tag">
                      <fa-icon [icon]="faTimes"></fa-icon>
                    </button>
                  </span>
                }
              </div>
            }
          </div>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" (click)="close()">
            <fa-icon [icon]="faTimes"></fa-icon> Cancelar
          </button>
          <button type="submit" class="btn btn-primary">
            <fa-icon [icon]="faSave"></fa-icon> Salvar
          </button>
        </div>

      </form>
    </div>
  </div>
}
