@if (open) {
  <div class="modal-overlay" (click)="close()">
    <div class="modal-box" (click)="$event.stopPropagation()">

      <div class="modal-header">
        <h2>{{ project ? 'Editar Projeto' : 'Novo Projeto' }}</h2>
      </div>

      <form class="modal-body" style="display:flex;flex-direction:column;gap:16px" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label class="form-label">
            Nome <span class="required">*</span>
          </label>
          <input
            class="form-input"
            [(ngModel)]="name"
            name="name"
            placeholder="Nome do projeto"
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label">Descrição</label>
          <textarea
            class="form-textarea"
            [(ngModel)]="description"
            name="description"
            placeholder="Descrição do projeto"
            rows="3"
          ></textarea>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" (click)="close()">
            <fa-icon [icon]="faTimes"></fa-icon> Cancelar
          </button>
          <button type="submit" class="btn btn-primary">
            <fa-icon [icon]="faSave"></fa-icon> Salvar
          </button>
        </div>
      </form>

    </div>
  </div>
}
