<app-page-header title="Clientes">
  <button action class="btn btn-primary" (click)="openCreate()">
    <fa-icon [icon]="faPlus"></fa-icon> Novo Cliente
  </button>
</app-page-header>

<div class="page-body">
  <div class="tl-card">
    @if (clients().length > 0) {
      <table class="tl-table">
        <thead>
          <tr>
            <th>Nome</th>
            <th>Projetos</th>
            <th style="width:100px">Ações</th>
          </tr>
        </thead>
        <tbody>
          @for (client of clients(); track client.id) {
            <tr>
              <td>{{ client.name }}</td>
              <td>
                <span class="tl-badge badge-accent">
                  {{ client.projectCount }} {{ client.projectCount === 1 ? 'projeto' : 'projetos' }}
                </span>
              </td>
              <td>
                <div class="row-actions">
                  <button class="btn btn-ghost btn-icon" (click)="openEdit(client)" title="Editar">
                    <fa-icon [icon]="faPencil"></fa-icon>
                  </button>
                  <button class="btn btn-ghost btn-icon danger" (click)="openDelete(client)" title="Excluir">
                    <fa-icon [icon]="faTrash"></fa-icon>
                  </button>
                </div>
              </td>
            </tr>
          }
        </tbody>
      </table>
    } @else {
      <div class="empty-state">
        <p>Nenhum cliente cadastrado.</p>
        <button class="btn btn-secondary" (click)="openCreate()">
          <fa-icon [icon]="faPlus"></fa-icon> Criar primeiro cliente
        </button>
      </div>
    }
  </div>
</div>

<app-client-modal
  [open]="modalOpen"
  [client]="editingClient"
  (openChange)="modalOpen = $event"
  (save)="onSave($event)"
></app-client-modal>

<app-confirm-delete-dialog
  [open]="deleteDialogOpen"
  [title]="'Excluir cliente'"
  [description]="'Tem certeza que deseja excluir o cliente ' + (clientToDelete?.name ?? '') + '?'"
  (openChange)="deleteDialogOpen = $event"
  (confirm)="onConfirmDelete()"
></app-confirm-delete-dialog>
